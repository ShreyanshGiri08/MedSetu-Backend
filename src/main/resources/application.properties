# ==============================
# SERVER
# ==============================
server.port=${PORT:8080}

# ==============================
# DATASOURCE
# ==============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT
# ==============================
jwt.secret=${JWT_SECRET}
jwt.expiry.ms=86400000

# ==============================
# MAIL (Gmail SMTP)
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==============================
# TWILIO SMS
# ==============================
twilio.account.sid=${TWILIO_SID}
twilio.auth.token=${TWILIO_TOKEN}
twilio.from.number=${TWILIO_NUMBER}

# ==============================
# RAZORPAY
# ==============================
razorpay.key.id=${RAZORPAY_KEY}
razorpay.key.secret=${RAZORPAY_SECRET}
razorpay.currency=INR

# ==============================
# GROQ AI
# ==============================
groq.api.key=${GROQ_API_KEY}
groq.api.url=https://api.groq.com/openai/v1/chat/completions
groq.model=llama-3.1-8b-instant

# ==============================
# FILE STORAGE
# ==============================
file.upload.dir=uploads

# ==============================
# ACTUATOR
# ==============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ==============================
# LOGGING
# ==============================
logging.level.com.medsetu=DEBUG
logging.level.org.springframework.security=INFO